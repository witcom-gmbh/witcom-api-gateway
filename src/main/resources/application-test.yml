spring:
  data:
    redis:
      host: redis
      port: 6379

application:
  command-config:
    enabled: true
    base-url: http://mockserver:1080/rmdb
    user: dummyuser
    password: dummypassword
    group: dummygroup
    mandant: dummymandant
  keycloak-config:
    keycloak-realm-id: devrealm
    keycloak-server-url: http://keycloak:9999
  spl-config:
    enabled: true
    tenants:
    - spl-base-url: http://mockserver:1080/smdb
      spl-user: dummyuser
      spl-password: dummypassword
      spl-tenant: tenant1
      tenant-name: TEST01
      default-tenant: true
    - spl-base-url: http://mockserver:1080/smdb
      spl-user: dummyuser
      spl-password: dummypassword
      spl-tenant: tenant2
      tenant-name: TEST02
  mcp-config:
    enabled: false
    base-url: http://mockserver:1080/mcp
    user: dummyuser
    password: dummypassword

logging:
  level:
    root: ERROR
    de.witcom: DEBUG
    org.springframework.cloud.config: DEBUG
    feign.Logger: DEBUG
    # org.springframework.cloud.gateway: DEBUG

server:
  port: 8080
